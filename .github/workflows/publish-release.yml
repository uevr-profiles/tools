name: Publish Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build repo.json
        shell: pwsh
        run: |
          .\tools\Build-UEVRRepo.ps1 -ProfilesDir ".\profiles" -SchemaFile ".\schemas\ProfileMeta.schema.json" -OutputFile ".\repo.json"

      - name: Create release with repo.json
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag   = "release-$(Get-Date -Format 'yyyy-MM-dd-HHmm')"
          $title = "$(Get-Date -Format 'yyyy-MM-dd HH:mm') UTC"

          gh release create $tag `
            --title $title `
            --notes "Automated profile index release." `
            .\repo.json
