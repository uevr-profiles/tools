name: Grab UEVRDeluxe Profiles

on:
  workflow_dispatch:
    inputs:
      download_limit:
        description: 'Max profiles to download (0 = unlimited)'
        required: false
        default: '0'

jobs:
  grab:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Update-FromUEVRDeluxe
        shell: pwsh
        run: |
          $limit = [int]"${{ github.event.inputs.download_limit }}"
          if ($limit -le 0) { $limit = 99999 }
          .\tools\Update-FromUEVRDeluxe.ps1 -Download -Extract -DownloadLimit $limit

      - name: Commit & push profile changes
        shell: pwsh
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profiles/
          if (git diff --cached --quiet) {
            Write-Host "No changes to commit."
          } else {
            git commit -m "chore: sync UEVRDeluxe profiles [$(Get-Date -Format 'yyyy-MM-dd HH:mm')]"
            git push
          }
